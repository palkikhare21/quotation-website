   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuoteFlow - Get Quotation</title>
    <link rel="stylesheet" href="get.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">QuoteFlow</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="#">GetQuote</a></li>
            <li><a href="admin.html">Admin</a></li> 
            <li><a href="sign.html">Sign In</a></li>
        </ul>
    </nav>

    <div class="page-wrapper">
        <div class="container">
            <h1>Create Your Quotation</h1>
            
            <form class="main-form" id="quotationForm">
>
                <div class="form-section">
                    <h3>Your Information</h3>
                    <label>Full name</label> <input type="text" placeholder="Enter name">
                    <label>Email</label> <input type="text" placeholder="Enter email">
                    <label>Phone</label> <input type="text" placeholder="Enter phone">
                    <label>Address</label> <input type="text" placeholder="Enter address">
                    <label>City</label> <input type="text" placeholder="Enter city">
                    <label>State</label> <input type="text" placeholder="Enter state">
                    <label>Zip</label> <input type="text" placeholder="Enter zip">
                    <label>Country</label> <input type="text" placeholder="Enter country">
                    <label>Company</label> <input type="text" placeholder="Enter company">
                    <label>Website</label> <input type="text" placeholder="Enter website">
                    <label>Logo URL</label> <input type="text" placeholder="Enter logo link">
                </div>

                <div class="form-section">
                    <h3>Service Details</h3>
                    <div id="item-list">
                        <div class="item-row">
                            <input type="text" placeholder="Service Description" class="desc">
                            <input type="number" placeholder="0.00" class="amt">
                        </div>
                    </div>
                    <button type="button" class="add-btn" onclick="addItem()">+ Add More Items</button>
                    
                    <div class="action-area">
                        <button type="submit" class="generate-btn">Generate Quotation</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 QuotationApp. All rights reserved.</p>
    </footer>

    <script>
        function addItem() {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = '<input type="text" placeholder="Service Description" class="desc"> <input type="number" placeholder="0.00" class="amt">';
            document.getElementById('item-list').appendChild(div);
        }
    </script>
</body>
</html>
<script src="script.js">
</script>

</body>
</html>
